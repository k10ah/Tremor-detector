<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tremor Monitor - User Info</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Tremor Monitor</h1>
        <form method="POST">
            <div class="avatar">
                <img id="avatarImg" src="{{ url_for('static', filename='img/male.png') }}" alt="Avatar">
            </div>
            <input type="text" name="name" placeholder="Name" required>
            <input type="number" name="age" placeholder="Age" required>
            <select name="gender" id="gender" onchange="updateAvatar()">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <input type="text" name="doctor" placeholder="Doctor Contact" required>
            <button type="submit">Start Monitoring</button>
        </form>
    </div>

    <script>
        function updateAvatar() {
            var gender = document.getElementById('gender').value;
            var avatar = document.getElementById('avatarImg');
            avatar.src = gender === 'Female' ? '/static/img/female.png' : '/static/img/male.png';
        }
    </script>
</body>
</html>
